name: car_history
description: Geely Atlas 2018 — История автомобиля

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # Images & Files
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # Charts
  fl_chart: ^0.69.0

  # Date formatting
  intl: ^0.19.0

  # State management
  provider: ^6.1.2

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Archive (backup)
  archive: ^3.6.1

  # Share
  share_plus: ^9.0.0

  # UUID
  uuid: ^4.4.2

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
